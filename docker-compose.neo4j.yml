services:
  neo4j:
    image: neo4j:5-community
    container_name: sdlc-tower-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-local-dev-password}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-local-dev-password}"
      NEO4J_dbms_usage__report_enabled: "false"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD}\" 'RETURN 1;' >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
